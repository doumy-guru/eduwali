<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Data dengan Bulk Delete</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            padding: 30px;
        }
        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .selected-info {
            font-size: 14px;
            color: #555;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f1f5f9;
        }
        /* Style Tombol */
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-view {
            background-color: #0284c7;
            color: white;
        }
        .btn-view:hover { background-color: #0369a1; }
        
        .btn-delete {
            background-color: #ef4444;
            color: white;
        }
        .btn-delete:hover { background-color: #dc2626; }
        
        .btn-delete:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        /* Style Modal Detail */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
        }
        .modal h3 { margin-top: 0; }
        .modal-close {
            margin-top: 20px;
            background-color: #64748b;
            color: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Data Pengguna</h2>
    
    <!-- Action Bar atas -->
    <div class="action-bar">
        <div class="selected-info" id="selectedCount">0 data terpilih</div>
        <button id="btnBulkDelete" class="btn btn-delete" disabled onclick="hapusSekaligus()">
            Hapus Terpilih
        </button>
    </div>

    <!-- Tabel Data -->
    <table>
        <thead>
            <tr>
                <th style="width: 40px; text-align: center;">
                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">
                </th>
                <th>ID</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr data-id="1">
                <td style="text-align: center;">
                    <input type="checkbox" class="row-checkbox" value="1" onchange="updateSelection()">
                </td>
                <td>1</td>
                <td>Budi Santoso</td>
                <td>budi@example.com</td>
                <td>
                    <button class="btn btn-view" onclick="lihatData(1, 'Budi Santoso', 'budi@example.com')">Lihat</button>
                    <button class="btn btn-delete" onclick="hapusSatuan(1, 'Budi Santoso')">Hapus</button>
                </td>
            </tr>
            <tr data-id="2">
                <td style="text-align: center;">
                    <input type="checkbox" class="row-checkbox" value="2" onchange="updateSelection()">
                </td>
                <td>2</td>
                <td>Siti Rahma</td>
                <td>siti@example.com</td>
                <td>
                    <button class="btn btn-view" onclick="lihatData(2, 'Siti Rahma', 'siti@example.com')">Lihat</button>
                    <button class="btn btn-delete" onclick="hapusSatuan(2, 'Siti Rahma')">Hapus</button>
                </td>
            </tr>
            <tr data-id="3">
                <td style="text-align: center;">
                    <input type="checkbox" class="row-checkbox" value="3" onchange="updateSelection()">
                </td>
                <td>3</td>
                <td>Ahmad Fauzi</td>
                <td>ahmad@example.com</td>
                <td>
                    <button class="btn btn-view" onclick="lihatData(3, 'Ahmad Fauzi', 'ahmad@example.com')">Lihat</button>
                    <button class="btn btn-delete" onclick="hapusSatuan(3, 'Ahmad Fauzi')">Hapus</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Modal Detail Data -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <h3>Detail Pengguna</h3>
        <p><strong>ID:</strong> <span id="modalId"></span></p>
        <p><strong>Nama:</strong> <span id="modalNama"></span></p>
        <p><strong>Email:</strong> <span id="modalEmail"></span></p>
        <button class="btn modal-close" onclick="tutupModal()">Tutup</button>
    </div>
</div>

<script>
    // 1. Fungsi Toggle Centang Semua (Select All)
    function toggleSelectAll(selectAllCheckbox) {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        checkboxes.forEach(cb => {
            cb.checked = selectAllCheckbox.checked;
        });
        updateSelection();
    }

    // 2. Fungsi Update Counter & Tombol Hapus Terpilih
    function updateSelection() {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
        const selectAllHeader = document.getElementById('selectAll');
        const btnBulkDelete = document.getElementById('btnBulkDelete');
        const selectedCount = document.getElementById('selectedCount');

        const totalChecked = checkedBoxes.length;

        // Update teks counter
        selectedCount.textContent = `${totalChecked} data terpilih`;

        // Atur status tombol Hapus Terpilih
        if (totalChecked > 0) {
            btnBulkDelete.disabled = false;
            btnBulkDelete.textContent = `Hapus (${totalChecked}) Terpilih`;
        } else {
            btnBulkDelete.disabled = true;
            btnBulkDelete.textContent = 'Hapus Terpilih';
        }

        // Atur centang 'Select All' berdasarkan kondisi centang individual
        if (checkboxes.length > 0 && totalChecked === checkboxes.length) {
            selectAllHeader.checked = true;
            selectAllHeader.indeterminate = false;
        } else if (totalChecked > 0) {
            selectAllHeader.checked = false;
            selectAllHeader.indeterminate = true; // Indikator sebagian tercentang
        } else {
            selectAllHeader.checked = false;
            selectAllHeader.indeterminate = false;
        }
    }

    // 3. Fungsi Lihat Data (Detail Modal)
    function lihatData(id, nama, email) {
        document.getElementById('modalId').textContent = id;
        document.getElementById('modalNama').textContent = nama;
        document.getElementById('modalEmail').textContent = email;
        document.getElementById('detailModal').style.display = 'flex';
    }

    function tutupModal() {
        document.getElementById('detailModal').style.display = 'none';
    }

    // 4. Fungsi Hapus Satuan
    function hapusSatuan(id, nama) {
        if (confirm(`Apakah Anda yakin ingin menghapus data "${nama}" (ID: ${id})?`)) {
            // Hapus baris dari DOM (atau panggil API backend di sini)
            const row = document.querySelector(`tr[data-id="${id}"]`);
            if (row) row.remove();
            
            updateSelection();
            alert(`Data "${nama}" berhasil dihapus.`);
        }
    }

    // 5. Fungsi Hapus Sekaligus (Bulk Delete)
    function hapusSekaligus() {
        const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
        const selectedIds = Array.from(checkedBoxes).map(cb => cb.value);

        if (selectedIds.length === 0) return;

        if (confirm(`Apakah Anda yakin ingin menghapus ${selectedIds.length} data terpilih (ID: ${selectedIds.join(', ')})?`)) {
            // Hapus semua baris yang tercentang
            selectedIds.forEach(id => {
                const row = document.querySelector(`tr[data-id="${id}"]`);
                if (row) row.remove();
            });

            // Reset header select all & update counter
            document.getElementById('selectAll').checked = false;
            updateSelection();

            alert(`${selectedIds.length} data berhasil dihapus.`);
            
            // Catatan: Jika menggunakan Backend (Node.js/Laravel/PHP), 
            // array `selectedIds` ini dikirim via fetch/axios POST ke API backend.
        }
    }
</script>

</body>
</html>
